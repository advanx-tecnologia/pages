<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Continuar no WhatsApp | Advanx</title>
  <script>!function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init','502759528362336');fbq('track','PageView');</script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-98EL5GXG5F"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-98EL5GXG5F');</script>
  <style>
    :root{--bg:#0f0d0a;--card:#17120e;--line:rgba(214,188,149,.16);--text:#f5efe6;--muted:#d4c7b6;--accent:#c96442;--accent-2:#dc8a61}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;display:grid;place-items:center;padding:20px;background:linear-gradient(180deg,#090705,#120d09);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text)}
    .card{width:min(680px,100%);background:linear-gradient(180deg,rgba(28,21,16,.97),rgba(16,12,10,.95));border:1px solid var(--line);border-radius:24px;padding:32px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
    h1{margin:0 0 14px;font-family:Georgia,"Times New Roman",serif;font-size:clamp(30px,5vw,44px);line-height:1.04}
    p{margin:0 0 16px;color:var(--muted);font-size:1.04rem;line-height:1.7}
    .actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}
    .btn{appearance:none;border:0;border-radius:16px;min-height:54px;padding:0 22px;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;font-weight:800;letter-spacing:.03em;cursor:pointer}
    .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;box-shadow:0 18px 40px rgba(201,100,66,.26)}
  </style>
</head>
<body>
  <main class="card">
    <h1>Perfeito. Vamos falar no WhatsApp.</h1>
    <p>Seu atendimento continua direto com nosso time para implementar o SCI com garantia de contratos fechados em até 41 dias.</p>
    <div class="actions">
      <a id="btnWhatsapp" class="btn btn-primary" target="_blank" rel="noopener">Ir para o WhatsApp</a>
    </div>
  </main>
  <script>
    const W='5571982470873';
    function tr(n,p={}){try{fbq('trackCustom',n,p)}catch(e){} try{gtag('event',n,p)}catch(e){}}
    const text='Oi, Quero implementar o SCI com garantia de contratos fechados em até 41d';
    const link=`https://wa.me/${W}?text=${encodeURIComponent(text)}`;
    const b=document.getElementById('btnWhatsapp');
    b.href=link;
    b.onclick=()=>tr('whatsapp_click',{origem:'form-adv-41d-obrigado',caminho:'apto_investir'});
    tr('obrigado_view',{origem:'form-adv-41d',caminho:'apto_investir'});
  </script>
</body>
</html>
