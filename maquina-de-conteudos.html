<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Máquina de Conteúdos | Advanx</title>
  <meta name="description" content="Conheça a máquina de conteúdos da Advanx para produzir com consistência e escala.">
  <meta name="theme-color" content="#F6F1E8">
  <link rel="preconnect" href="https://res.cloudinary.com">
  <link rel="preconnect" href="https://lhbwfbquxkutcyqazpnw.supabase.co" crossorigin>
  <style>
    :root {
      --copper: #B56A32;
      --copper-dark: #A45F2B;
      --cream: #F6F1E8;
      --cream-soft: #EFE6D8;
      --charcoal: #111111;
      --muted: #5B5B5B;
      --border: #D3CEC6;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--cream);
      color: var(--charcoal);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body { overflow-x: hidden; }

    .page {
      width: min(100% - 32px, 1040px);
      min-height: 100dvh;
      margin: 0 auto;
      padding: 28px 0 72px;
      text-align: center;
    }

    .brand {
      display: flex;
      justify-content: center;
      margin-bottom: clamp(30px, 5vw, 52px);
    }

    .brand img {
      display: block;
      width: 58px;
      height: 58px;
      object-fit: contain;
    }

    .hero {
      display: grid;
      justify-items: center;
    }

    h1 {
      max-width: 800px;
      margin: 0;
      font-size: clamp(34px, 4.2vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.04em;
      font-weight: 750;
      text-wrap: balance;
    }

    h1 strong {
      color: var(--copper-dark);
      font-weight: 780;
    }

    .subheadline {
      max-width: 650px;
      margin: 17px 0 0;
      color: #454545;
      font-size: clamp(17px, 1.8vw, 19px);
      line-height: 1.5;
      text-wrap: balance;
    }

    .video-wrap {
      position: relative;
      width: min(100%, 410px);
      margin-top: clamp(26px, 4vw, 36px);
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--charcoal);
      box-shadow: 0 18px 50px rgba(17, 17, 17, 0.12);
    }

    video {
      display: block;
      width: 100%;
      aspect-ratio: 720 / 1278;
      background: var(--charcoal);
      object-fit: cover;
    }

    .player-toggle {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    .play-disc {
      position: relative;
      width: 70px;
      height: 70px;
      border: 1px solid rgba(255,255,255,.5);
      border-radius: 50%;
      background: rgba(17,17,17,.78);
      box-shadow: 0 8px 30px rgba(0,0,0,.28);
      transition: opacity .18s ease, transform .18s ease;
      backdrop-filter: blur(8px);
    }

    .play-disc::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 53%;
      width: 0;
      height: 0;
      border-top: 11px solid transparent;
      border-bottom: 11px solid transparent;
      border-left: 17px solid var(--white);
      transform: translate(-42%, -50%);
    }

    .video-wrap.is-playing .play-disc {
      opacity: 0;
      transform: scale(.9);
    }

    .video-wrap.is-playing .play-disc::before {
      width: 16px;
      height: 20px;
      border: 0;
      background: linear-gradient(90deg, var(--white) 0 5px, transparent 5px 11px, var(--white) 11px 16px);
      transform: translate(-50%, -50%);
    }

    .video-wrap.is-playing:hover .play-disc,
    .player-toggle:focus-visible .play-disc {
      opacity: 1;
      transform: scale(1);
    }

    .player-toggle:focus-visible {
      outline: 3px solid var(--copper);
      outline-offset: -3px;
    }

    .cta-wrap {
      width: min(100%, 410px);
      margin-top: 18px;
    }

    .cta-wrap[hidden] { display: none; }

    .cta {
      display: flex;
      min-height: 56px;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border: 1px solid var(--copper);
      border-radius: 8px;
      background: var(--copper);
      color: var(--white);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.25;
      text-decoration: none;
      transition: background-color .18s ease, border-color .18s ease, transform .18s ease;
    }

    .cta:hover,
    .cta:focus-visible {
      border-color: var(--copper-dark);
      background: var(--copper-dark);
      outline: none;
      transform: translateY(-1px);
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 24px, 560px);
        padding: 18px 0 42px;
      }

      .brand { margin-bottom: 26px; }

      .brand img {
        width: 50px;
        height: 50px;
      }

      h1 {
        max-width: 360px;
        font-size: clamp(27px, 7.4vw, 32px);
        line-height: 1.13;
        letter-spacing: -0.03em;
      }

      .subheadline {
        max-width: 350px;
        margin-top: 16px;
        font-size: 17px;
        line-height: 1.5;
      }

      .video-wrap { margin-top: 24px; }
      .play-disc { width: 62px; height: 62px; }
      .cta { min-height: 54px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .cta, .play-disc { transition: none; }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="brand">
      <img
        src="https://lhbwfbquxkutcyqazpnw.supabase.co/storage/v1/render/image/public/images/logo/logo-advanx-transparente.webp?width=128&height=128&resize=contain&format=webp"
        srcset="https://lhbwfbquxkutcyqazpnw.supabase.co/storage/v1/render/image/public/images/logo/logo-advanx-transparente.webp?width=64&height=64&resize=contain&format=webp 64w, https://lhbwfbquxkutcyqazpnw.supabase.co/storage/v1/render/image/public/images/logo/logo-advanx-transparente.webp?width=128&height=128&resize=contain&format=webp 128w"
        sizes="(max-width: 560px) 50px, 58px"
        width="58"
        height="58"
        fetchpriority="high"
        decoding="async"
        alt="Advanx">
    </header>

    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">Chega de improvisar. Sua produção de conteúdo precisa de <strong>um sistema</strong>.</h1>
      <p class="subheadline">Conheça a máquina de conteúdos da Advanx para produzir com consistência e escala.</p>

      <div class="video-wrap" id="videoWrap">
        <video
          id="vslVideo"
          playsinline
          preload="metadata"
          disablepictureinpicture
          src="https://res.cloudinary.com/dmf4bqbdd/video/upload/v1784336681/Advanx_Posts_1_tusmzb.mp4">
        </video>
        <button class="player-toggle" id="playerToggle" type="button" aria-label="Reproduzir vídeo">
          <span class="play-disc" aria-hidden="true"></span>
        </button>
      </div>

      <div class="cta-wrap" id="ctaWrap" hidden>
        <a
          class="cta"
          id="whatsappCta"
          href="https://wa.me/5571982470873?text=Quero%20gerar%20minha%20m%C3%A1quina%20de%20conte%C3%BAdos."
          target="_blank"
          rel="noopener">Quero gerar minha máquina de conteúdos</a>
      </div>
    </section>
  </main>

  <script>
    (() => {
      'use strict';

      const CTA_DELAY_MS = 60 * 1000;
      const video = document.getElementById('vslVideo');
      const videoWrap = document.getElementById('videoWrap');
      const playerToggle = document.getElementById('playerToggle');
      const ctaWrap = document.getElementById('ctaWrap');
      const whatsappCta = document.getElementById('whatsappCta');

      let watchedMs = 0;
      let lastTick = null;
      let playbackActive = false;
      let ctaRevealed = false;
      let viewContentTracked = false;

      function emitEvent(name, params = {}) {
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({ event: name, ...params });
        window.dispatchEvent(new CustomEvent(`advanx:${name}`, { detail: params }));

        if (typeof window.gtag === 'function') {
          window.gtag('event', name, params);
        }
      }

      function revealCta() {
        if (ctaRevealed) return;
        ctaRevealed = true;
        ctaWrap.hidden = false;
        emitEvent('cta_revealed', { watched_seconds: 60 });
        requestAnimationFrame(() => ctaWrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' }));
      }

      function stopClock() {
        playbackActive = false;
        lastTick = null;
      }

      function startClock() {
        playbackActive = true;
        lastTick = performance.now();
      }

      function tick(now) {
        if (playbackActive && !document.hidden && !ctaRevealed) {
          if (lastTick !== null) {
            watchedMs += Math.min(now - lastTick, 1000);
            if (watchedMs >= CTA_DELAY_MS) revealCta();
          }
          lastTick = now;
        } else {
          lastTick = null;
        }
        requestAnimationFrame(tick);
      }

      video.addEventListener('playing', () => {
        startClock();
        videoWrap.classList.add('is-playing');
        playerToggle.setAttribute('aria-label', 'Pausar vídeo');
        if (!viewContentTracked) {
          viewContentTracked = true;
          emitEvent('view_content', { video: 'maquina_de_conteudos' });
        }
      });

      ['pause', 'waiting', 'stalled', 'ended', 'emptied'].forEach(eventName => {
        video.addEventListener(eventName, () => {
          stopClock();
          videoWrap.classList.remove('is-playing');
          playerToggle.setAttribute('aria-label', 'Reproduzir vídeo');
        });
      });

      playerToggle.addEventListener('click', () => {
        if (video.paused || video.ended) {
          video.play();
        } else {
          video.pause();
        }
      });

      document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
          lastTick = null;
        } else if (!video.paused && !video.ended) {
          startClock();
        }
      });

      window.addEventListener('focus', () => {
        if (!video.paused && !video.ended && !document.hidden) startClock();
      });

      whatsappCta.addEventListener('click', () => {
        emitEvent('whatsapp_click', { destination: 'advanxia1' });
        emitEvent('Contact', { destination: 'advanxia1' });
      });

      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
