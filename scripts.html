<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Advanx | Scripts Validados</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: '#ff7a01',
            dark: '#0f1115',
            panel: 'rgba(30, 33, 40, 0.7)'
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0f1115;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-image: radial-gradient(circle at 50% 0%, rgba(255, 122, 1, 0.08) 0%, transparent 50%);
    }
    .glass {
      background: rgba(25, 28, 35, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
    }
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <nav class="glass sticky top-0 z-50 m-4 p-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-brand flex items-center justify-center text-white font-bold">A</div>
      <span class="font-bold text-lg tracking-tight">Hub <span class="text-brand">Advanx</span></span>
    </div>
    <div class="text-sm font-medium text-gray-400">Banco de Scripts</div>
  </nav>

  <main class="flex-1 container mx-auto px-4 pb-10 flex flex-col lg:flex-row gap-6 h-[calc(100vh-100px)]">
    
    <!-- Sidebar / Filtros -->
    <aside class="glass w-full lg:w-1/3 flex flex-col h-full overflow-hidden">
      <div class="p-4 border-b border-white/5">
        <h2 class="text-lg font-semibold mb-3 flex items-center gap-2"><i class="fa-solid fa-filter text-brand"></i> Filtros</h2>
        
        <div class="mb-4">
          <label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Nicho</label>
          <select id="niche-select" class="w-full bg-dark/50 border border-white/10 rounded p-2 text-sm focus:outline-none focus:border-brand transition-colors">
            <option value="all">Todos os Nichos</option>
          </select>
        </div>

        <div>
          <label class="text-xs text-gray-400 uppercase tracking-wider mb-1 block">Buscar Tese</label>
          <div class="relative">
            <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-500 text-sm"></i>
            <input type="text" id="search-input" placeholder="Ex: Acidente de trabalho..." class="w-full bg-dark/50 border border-white/10 rounded p-2 pl-9 text-sm focus:outline-none focus:border-brand transition-colors">
          </div>
        </div>
      </div>
      
      <!-- Lista de Scripts -->
      <div class="flex-1 overflow-y-auto scrollbar-hide p-2" id="scripts-list">
        <!-- Itens injetados via JS -->
      </div>
    </aside>

    <!-- Visualizador -->
    <section class="glass w-full lg:w-2/3 flex flex-col h-full overflow-hidden relative">
      <div class="p-6 border-b border-white/5 flex justify-between items-center shrink-0">
        <div>
          <span id="view-niche" class="text-xs font-bold bg-brand/20 text-brand px-2 py-1 rounded mb-2 inline-block">Nicho</span>
          <h1 id="view-title" class="text-xl md:text-2xl font-bold">Selecione um Script</h1>
        </div>
        <button id="copy-btn" class="hidden bg-brand hover:bg-orange-600 text-white p-2 md:px-4 md:py-2 rounded transition-colors flex items-center gap-2 text-sm font-medium">
          <i class="fa-regular fa-copy"></i> <span class="hidden md:inline">Copiar Copy</span>
        </button>
      </div>
      
      <div class="flex-1 p-6 overflow-y-auto scrollbar-hide bg-dark/20 text-gray-300 text-sm md:text-base leading-relaxed" id="view-content">
        <div class="h-full flex flex-col items-center justify-center text-gray-500 gap-4">
          <i class="fa-solid fa-file-lines text-4xl opacity-50"></i>
          <p>Selecione um roteiro na lista ao lado para visualizar a copy completa.</p>
        </div>
      </div>
    </section>

  </main>

  <script>
    let allScripts = [];
    let currentScripts = [];

    // Elements
    const nicheSelect = document.getElementById('niche-select');
    const searchInput = document.getElementById('search-input');
    const scriptsList = document.getElementById('scripts-list');
    const viewNiche = document.getElementById('view-niche');
    const viewTitle = document.getElementById('view-title');
    const viewContent = document.getElementById('view-content');
    const copyBtn = document.getElementById('copy-btn');

    // Load Data
    fetch('scripts_data.json')
      .then(res => res.json())
      .then(data => {
        allScripts = data;
        currentScripts = data;
        
        // Populate Niches
        const niches = [...new Set(data.map(s => s.niche))].sort();
        niches.forEach(n => {
          const opt = document.createElement('option');
          opt.value = n;
          opt.textContent = n;
          nicheSelect.appendChild(opt);
        });

        renderList();
      })
      .catch(err => {
        console.error("Erro ao carregar dados", err);
        scriptsList.innerHTML = `<div class="p-4 text-red-400 text-sm">Erro ao carregar os scripts. Verifique se scripts_data.json existe.</div>`;
      });

    // Render List
    function renderList() {
      scriptsList.innerHTML = '';
      if(currentScripts.length === 0) {
        scriptsList.innerHTML = `<div class="p-4 text-gray-500 text-sm text-center">Nenhum script encontrado.</div>`;
        return;
      }

      currentScripts.forEach((script, idx) => {
        const div = document.createElement('div');
        div.className = 'p-3 mb-2 rounded border border-transparent hover:border-white/10 hover:bg-white/5 cursor-pointer transition-colors';
        div.innerHTML = `
          <div class="text-xs text-brand font-medium mb-1">${script.niche}</div>
          <div class="font-medium text-sm text-gray-200 line-clamp-2">${script.title}</div>
        `;
        div.onclick = () => selectScript(script);
        scriptsList.appendChild(div);
      });
    }

    // Select Script
    let activeContent = "";
    function selectScript(script) {
      viewNiche.textContent = script.niche;
      viewTitle.textContent = script.title;
      activeContent = script.content;
      
      // Render text properly handling line breaks
      viewContent.innerHTML = `<pre class="font-sans whitespace-pre-wrap">${escapeHTML(script.content)}</pre>`;
      copyBtn.classList.remove('hidden');
    }

    // Copy to clipboard
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(activeContent).then(() => {
        const originalHtml = copyBtn.innerHTML;
        copyBtn.innerHTML = `<i class="fa-solid fa-check"></i> <span class="hidden md:inline">Copiado!</span>`;
        copyBtn.classList.replace('bg-brand', 'bg-green-600');
        setTimeout(() => {
          copyBtn.innerHTML = originalHtml;
          copyBtn.classList.replace('bg-green-600', 'bg-brand');
        }, 2000);
      });
    };

    // Filters
    function applyFilters() {
      const niche = nicheSelect.value;
      const term = searchInput.value.toLowerCase();

      currentScripts = allScripts.filter(s => {
        const matchNiche = niche === 'all' || s.niche === niche;
        const matchTerm = s.title.toLowerCase().includes(term) || s.content.toLowerCase().includes(term);
        return matchNiche && matchTerm;
      });
      renderList();
    }

    nicheSelect.addEventListener('change', applyFilters);
    searchInput.addEventListener('input', applyFilters);

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
      );
    }
  </script>
</body>
</html>
