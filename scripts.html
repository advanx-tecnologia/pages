<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hub Advanx | Scripts de Alta Conversão</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              DEFAULT: '#ff7a01',
              light: '#ffa040',
              dark: '#cc6200',
              subtle: 'rgba(255, 122, 1, 0.1)'
            },
            dark: {
              bg: '#0a0a0c',
              surface: '#121316',
              border: '#2a2b30'
            }
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #0a0a0c;
      color: #e2e8f0;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(255, 122, 1, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(255, 122, 1, 0.03), transparent 25%);
      background-attachment: fixed;
    }
    .glass-nav {
      background: rgba(18, 19, 22, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid #2a2b30;
    }
    .glass-panel {
      background: rgba(18, 19, 22, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid #2a2b30;
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }
    
    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a2b30;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #ff7a01;
    }

    .script-item.active {
      background-color: rgba(255, 122, 1, 0.1);
      border-left: 3px solid #ff7a01;
    }

    /* Content Typography */
    .content-body pre {
      white-space: pre-wrap;
      font-family: inherit;
      line-height: 1.7;
      color: #cbd5e1;
    }
    .content-body strong {
      color: #fff;
      font-weight: 600;
    }
    
    /* Animation */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col h-screen overflow-hidden">

  <!-- Navbar -->
  <nav class="glass-nav sticky top-0 z-50 flex-shrink-0 h-16 flex items-center px-6 justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 rounded bg-gradient-to-br from-brand to-brand-dark flex items-center justify-center text-white font-bold shadow-[0_0_10px_rgba(255,122,1,0.4)]">A</div>
      <span class="font-bold text-lg tracking-tight">Hub <span class="text-brand">Advanx</span></span>
    </div>
    
    <div class="flex items-center gap-4">
      <div class="hidden md:flex items-center gap-2 text-xs text-gray-400 bg-dark-surface px-3 py-1.5 rounded-full border border-dark-border">
        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        <span>Sync Auto: Ativo</span>
      </div>
      <span class="text-sm font-medium text-gray-400 bg-dark-border px-3 py-1 rounded">Roteiros e Copys</span>
    </div>
  </nav>

  <!-- Main Workspace -->
  <main class="flex-1 p-4 lg:p-6 flex flex-col lg:flex-row gap-6 overflow-hidden h-[calc(100vh-4rem)]">

    <!-- Sidebar / Filtros -->
    <aside class="glass-panel w-full lg:w-[380px] flex flex-col h-full flex-shrink-0">
      
      <!-- Top Filters -->
      <div class="p-5 border-b border-dark-border shrink-0">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-lg font-semibold text-white">Explorar</h2>
          <span id="total-count" class="text-xs font-bold bg-brand-subtle text-brand px-2 py-1 rounded-full">0 roteiros</span>
        </div>
        
        <div class="space-y-4">
          <div class="relative">
            <i class="fa-solid fa-search absolute left-3 top-3 text-gray-500 text-sm"></i>
            <input type="text" id="search-input" placeholder="Buscar tese, palavra-chave..." 
              class="w-full bg-dark-bg border border-dark-border rounded-lg p-2.5 pl-9 text-sm text-white placeholder-gray-500 focus:outline-none focus:border-brand focus:ring-1 focus:ring-brand transition-all">
          </div>

          <div class="relative">
            <select id="niche-select" class="w-full appearance-none bg-dark-bg border border-dark-border rounded-lg p-2.5 text-sm text-gray-300 focus:outline-none focus:border-brand transition-all cursor-pointer">
              <option value="all">📁 Todos os Nichos</option>
            </select>
            <i class="fa-solid fa-chevron-down absolute right-3 top-3.5 text-gray-500 text-xs pointer-events-none"></i>
          </div>
        </div>
      </div>

      <!-- List Container -->
      <div class="flex-1 overflow-y-auto p-3 space-y-1" id="scripts-list">
        <!-- Loader -->
        <div class="flex justify-center items-center h-32 text-brand">
          <i class="fa-solid fa-circle-notch fa-spin fa-2x"></i>
        </div>
      </div>
      
    </aside>

    <!-- Editor / Visualizador -->
    <section class="glass-panel w-full flex flex-col h-full relative overflow-hidden flex-1">
      
      <!-- View Header -->
      <header class="p-6 border-b border-dark-border bg-dark-surface/30 shrink-0 flex flex-col sm:flex-row sm:items-start justify-between gap-4">
        <div class="flex-1">
          <div class="flex items-center gap-2 mb-2">
            <span id="view-niche" class="text-xs font-bold bg-dark-border text-gray-300 px-2 py-1 rounded">Selecione</span>
          </div>
          <h1 id="view-title" class="text-xl md:text-2xl font-bold text-white leading-tight">Painel de Scripts Advanx</h1>
        </div>
        
        <button id="copy-btn" class="hidden shrink-0 h-fit bg-brand hover:bg-brand-light text-white px-5 py-2.5 rounded-lg transition-all flex items-center gap-2 text-sm font-semibold shadow-[0_4px_14px_rgba(255,122,1,0.3)] hover:shadow-[0_6px_20px_rgba(255,122,1,0.4)] hover:-translate-y-0.5">
          <i class="fa-regular fa-copy"></i> <span>Copiar Texto</span>
        </button>
      </header>
      
      <!-- View Content -->
      <div class="flex-1 overflow-y-auto p-6 md:p-10 content-body relative" id="view-content">
        
        <!-- Empty State -->
        <div class="h-full flex flex-col items-center justify-center text-gray-500 text-center animate-fade">
          <div class="w-16 h-16 mb-4 rounded-2xl bg-dark-border flex items-center justify-center">
            <i class="fa-solid fa-wand-magic-sparkles text-2xl text-brand/50"></i>
          </div>
          <h3 class="text-lg font-medium text-gray-300 mb-2">Nenhum roteiro selecionado</h3>
          <p class="max-w-xs text-sm">Selecione uma tese no menu lateral para visualizar e copiar a estrutura do anúncio.</p>
        </div>

      </div>
    </section>

  </main>

  <script>
    let allScripts = [];
    let currentScripts = [];

    // DOM Elements
    const nicheSelect = document.getElementById('niche-select');
    const searchInput = document.getElementById('search-input');
    const scriptsList = document.getElementById('scripts-list');
    const viewNiche = document.getElementById('view-niche');
    const viewTitle = document.getElementById('view-title');
    const viewContent = document.getElementById('view-content');
    const copyBtn = document.getElementById('copy-btn');
    const totalCount = document.getElementById('total-count');

    // Init
    fetch('scripts_data.json')
      .then(res => res.json())
      .then(data => {
        allScripts = data;
        currentScripts = data;
        
        // Count niches
        const nicheCount = {};
        data.forEach(s => {
          nicheCount[s.niche] = (nicheCount[s.niche] || 0) + 1;
        });

        const niches = Object.keys(nicheCount).sort();
        niches.forEach(n => {
          const opt = document.createElement('option');
          opt.value = n;
          opt.textContent = `${n} (${nicheCount[n]})`;
          nicheSelect.appendChild(opt);
        });

        renderList();
      })
      .catch(err => {
        console.error("Erro", err);
        scriptsList.innerHTML = `<div class="p-4 text-red-400 text-sm flex items-center gap-2"><i class="fa-solid fa-triangle-exclamation"></i> Banco de dados indisponível.</div>`;
      });

    function renderList() {
      scriptsList.innerHTML = '';
      totalCount.textContent = `${currentScripts.length} roteiros`;
      
      if(currentScripts.length === 0) {
        scriptsList.innerHTML = `<div class="p-8 text-gray-500 text-sm text-center">Nenhum resultado encontrado.</div>`;
        return;
      }

      currentScripts.forEach(script => {
        const div = document.createElement('div');
        div.className = 'script-item p-3.5 rounded-lg border border-transparent hover:border-dark-border cursor-pointer transition-all duration-200 group';
        
        div.innerHTML = `
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="text-[11px] font-semibold tracking-wide text-brand mb-1.5 uppercase">${script.niche}</div>
              <div class="font-medium text-sm text-gray-200 leading-snug group-hover:text-white transition-colors line-clamp-2">${script.title}</div>
            </div>
            <i class="fa-solid fa-chevron-right text-xs text-gray-600 opacity-0 group-hover:opacity-100 transition-opacity mt-5"></i>
          </div>
        `;
        
        div.onclick = () => {
          document.querySelectorAll('.script-item').forEach(el => el.classList.remove('active'));
          div.classList.add('active');
          selectScript(script);
        };
        
        scriptsList.appendChild(div);
      });
    }

    let activeContent = "";
    function selectScript(script) {
      viewNiche.textContent = script.niche;
      viewTitle.textContent = script.title;
      activeContent = script.content;

      // Basic markdown-like parsing for bold titles
      let formattedText = escapeHTML(script.content)
        .replace(/^(Anúncio \d+|HEADLINE PADRÃO|\[.*?\]):?/gm, '<strong class="text-brand">$1</strong>')
        .replace(/^>> (.*)/gm, '<span class="text-brand-light italic">>> $1</span>');

      viewContent.innerHTML = `<div class="animate-fade"><pre>${formattedText}</pre></div>`;
      copyBtn.classList.remove('hidden');
      
      // Mobile smooth scroll to content
      if(window.innerWidth < 1024) {
        viewContent.parentElement.scrollIntoView({ behavior: 'smooth' });
      }
    }

    copyBtn.onclick = () => {
      navigator.clipboard.writeText(activeContent).then(() => {
        const originalHtml = copyBtn.innerHTML;
        copyBtn.innerHTML = `<i class="fa-solid fa-check"></i> <span>Copiado!</span>`;
        copyBtn.classList.replace('bg-brand', 'bg-green-500');
        copyBtn.classList.replace('hover:bg-brand-light', 'hover:bg-green-400');
        copyBtn.classList.replace('shadow-[0_4px_14px_rgba(255,122,1,0.3)]', 'shadow-[0_4px_14px_rgba(34,197,94,0.3)]');
        
        setTimeout(() => {
          copyBtn.innerHTML = originalHtml;
          copyBtn.classList.replace('bg-green-500', 'bg-brand');
          copyBtn.classList.replace('hover:bg-green-400', 'hover:bg-brand-light');
          copyBtn.classList.replace('shadow-[0_4px_14px_rgba(34,197,94,0.3)]', 'shadow-[0_4px_14px_rgba(255,122,1,0.3)]');
        }, 2000);
      });
    };

    function applyFilters() {
      const niche = nicheSelect.value;
      const term = searchInput.value.toLowerCase();

      currentScripts = allScripts.filter(s => {
        const matchNiche = niche === 'all' || s.niche === niche;
        const matchTerm = s.title.toLowerCase().includes(term) || s.content.toLowerCase().includes(term);
        return matchNiche && matchTerm;
      });
      renderList();
    }

    nicheSelect.addEventListener('change', applyFilters);
    searchInput.addEventListener('input', applyFilters);

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            "'": '&#39;',
            '"': '&quot;'
          }[tag] || tag)
      );
    }
  </script>
</body>
</html>
