<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obrigado - Próximo passo</title>
  <style>
    :root{--bg:#0b0b0f;--card:#14141c;--text:#f5f7ff;--muted:#aeb3c2;--primary:#20c15a}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#09090d,#12121a);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)}
    .wrap{max-width:920px;margin:28px auto;padding:16px}
    .card{background:var(--card);border:1px solid #242436;border-radius:18px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    h1{font-size:clamp(24px,3vw,34px);margin:0 0 10px;text-align:center}
    p{color:var(--muted);text-align:center;margin:0 0 20px}
    .video{position:relative;width:100%;padding-top:56.25%;border-radius:14px;overflow:hidden;background:#000}
    iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
    .cta{display:block;margin:22px auto 6px;max-width:420px;text-align:center;text-decoration:none;background:var(--primary);color:#fff;font-weight:800;padding:15px 16px;border-radius:12px}
    .mini{color:#8e93a6;text-align:center;font-size:13px}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Assista ao vídeo e fale com nosso time</h1>
      <p>Ao clicar no botão abaixo, suas respostas já irão preenchidas no WhatsApp.</p>

      <div class="video">
        <iframe src="https://www.youtube.com/embed/Mr7ijm9Cigk?rel=0&modestbranding=1" allowfullscreen></iframe>
      </div>

      <a id="btnWhatsapp" class="cta" target="_blank" rel="noopener">Falar no WhatsApp agora</a>
      <div class="mini">Se o botão não abrir, atualize a página e tente novamente.</div>
    </section>
  </main>

  <script>
    const WHATSAPP_NUMBER = '5571982470873';

    const p = new URLSearchParams(window.location.search);
    const nome = (p.get('nome') || '').trim();
    const whatsapp = (p.get('whatsapp') || '').trim();
    const email = (p.get('email') || '').trim();
    const nicho = (p.get('nicho') || '').trim();

    const texto = [
      'Olá, vim da página form-adv-v5.',
      '',
      '*Dados do formulário*',
      `• Nome completo: ${nome || '-'}`,
      `• WhatsApp: ${whatsapp || '-'}`,
      `• E-mail: ${email || '-'}`,
      `• Nicho: ${nicho || '-'}`
    ].join('\n');

    const link = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(texto)}`;
    document.getElementById('btnWhatsapp').href = link;
  </script>
</body>
</html>
