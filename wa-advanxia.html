<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanx IA | Abrindo WhatsApp</title>
  <meta name="description" content="Redirecionamento rastreável para o WhatsApp da Advanx IA.">

  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init','502759528362336');
    fbq('track','PageView');
  </script>
  <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=502759528362336&ev=PageView&noscript=1"/></noscript>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-98EL5GXG5F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-98EL5GXG5F');
  </script>

  <style>
    :root{
      --bg:#0f1115;
      --card:#171a21;
      --muted:#9ca3af;
      --text:#f9fafb;
      --brand:#ff7a01;
      --brand-dark:#e46800;
      --wa:#25D366;
      --wa-dark:#1faa52;
      --line:rgba(255,255,255,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      background:radial-gradient(circle at top, rgba(255,122,1,.18), transparent 32%), var(--bg);
      color:var(--text);
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .card{
      width:min(100%, 460px);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px 24px;
      box-shadow:0 18px 60px rgba(0,0,0,.35);
      text-align:center;
    }
    .brand{
      font-size:12px;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted);
      margin-bottom:20px;
    }
    .brand strong{color:var(--brand)}
    .icon{
      width:72px;
      height:72px;
      border-radius:999px;
      margin:0 auto 18px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(37,211,102,.12);
      border:1px solid rgba(37,211,102,.25);
      box-shadow:0 0 0 10px rgba(37,211,102,.05);
      font-size:34px;
    }
    h1{
      margin:0 0 12px;
      font-size:28px;
      line-height:1.15;
    }
    p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:15px;
    }
    .status{
      margin-top:18px;
      font-size:14px;
      color:#d1d5db;
    }
    .actions{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin-top:24px;
    }
    .btn{
      appearance:none;
      border:none;
      border-radius:14px;
      padding:15px 18px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      text-decoration:none;
      transition:transform .15s ease, opacity .15s ease, background .15s ease;
    }
    .btn:active{transform:scale(.98)}
    .btn-wa{background:var(--wa);color:#fff}
    .btn-wa:hover{background:var(--wa-dark)}
    .btn-alt{background:rgba(255,255,255,.06);color:var(--text);border:1px solid var(--line)}
    .meta{
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid var(--line);
      font-size:12px;
      color:#9ca3af;
      line-height:1.7;
      text-align:left;
      word-break:break-word;
    }
    .meta strong{color:#e5e7eb}
    .loader{
      width:18px;
      height:18px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.15);
      border-top-color:var(--brand);
      display:inline-block;
      vertical-align:-3px;
      animation:spin .85s linear infinite;
      margin-right:8px;
    }
    .toast{
      margin-top:12px;
      font-size:13px;
      color:#c7f9d7;
      min-height:18px;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand"><strong>Advanx</strong> IA</div>
    <div class="icon">💬</div>
    <h1>Estamos abrindo o WhatsApp</h1>
    <p>Esta página registra a origem do clique, dispara os eventos de tracking e redireciona para o WhatsApp comercial da Advanx IA.</p>
    <div class="status" id="status"><span class="loader"></span>Preparando redirecionamento…</div>

    <div class="actions">
      <a class="btn btn-wa" id="openNow" href="#" target="_self" rel="noopener">Abrir WhatsApp agora</a>
      <button class="btn btn-alt" id="copyMsg" type="button">Copiar mensagem de fallback</button>
    </div>

    <div class="toast" id="toast"></div>
    <div class="meta" id="meta"></div>
  </main>

  <script>
    const WA_NUMBER = '5571982470873';
    const DEFAULT_MESSAGE = 'Olá! Vim pela página da Advanx IA e quero falar com a equipe.';
    const REDIRECT_DELAY_MS = 1200;
    const url = new URL(window.location.href);
    const params = url.searchParams;
    const utmKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term'];
    const clickKeys = ['fbclid','gclid','ttclid'];
    const utms = Object.fromEntries(utmKeys.map(key => [key, params.get(key) || '']).filter(([,value]) => value));
    const clickIds = Object.fromEntries(clickKeys.map(key => [key, params.get(key) || '']).filter(([,value]) => value));
    const clickRef = 'wa_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

    const statusEl = document.getElementById('status');
    const toastEl = document.getElementById('toast');
    const metaEl = document.getElementById('meta');
    const openNowEl = document.getElementById('openNow');
    const copyMsgEl = document.getElementById('copyMsg');

    function safeTrackMeta(name, payload){
      try { if (typeof fbq === 'function') fbq('trackCustom', name, payload || {}); } catch (_) {}
    }

    function safeTrackMetaStd(name, payload){
      try { if (typeof fbq === 'function') fbq('track', name, payload || {}); } catch (_) {}
    }

    function safeTrackGoogle(name, payload){
      try { if (typeof gtag === 'function') gtag('event', name, payload || {}); } catch (_) {}
    }

    function buildAttributionMessage(){
      const lines = [params.get('text') || DEFAULT_MESSAGE, '', '*Ref. de origem:*'];
      if (Object.keys(utms).length) {
        Object.entries(utms).forEach(([key, value]) => lines.push(`${key}: ${value}`));
      } else {
        lines.push('origem_direta: sem_utm');
      }
      lines.push(`click_ref: ${clickRef}`);
      return lines.join('\n');
    }

    const waMessage = buildAttributionMessage();
    const waWebUrl = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(waMessage)}`;
    const waAppUrl = `whatsapp://send?phone=${WA_NUMBER}&text=${encodeURIComponent(waMessage)}`;

    openNowEl.href = waWebUrl;

    try {
      localStorage.setItem('advanx_last_whatsapp_redirect', JSON.stringify({
        click_ref: clickRef,
        url: window.location.href,
        utms,
        click_ids: clickIds,
        created_at: new Date().toISOString(),
        destination: WA_NUMBER
      }));
    } catch (_) {}

    const trackingPayload = {
      destination: 'advanxia_comercial',
      whatsapp_number: WA_NUMBER,
      click_ref: clickRef,
      page_path: window.location.pathname,
      ...utms,
      ...clickIds
    };

    safeTrackMeta('ViewContent', {content_name: 'redirect_whatsapp_advanxia'});
    safeTrackMeta('WhatsAppRedirectPageView', trackingPayload);
    safeTrackGoogle('view_content', trackingPayload);
    safeTrackGoogle('whatsapp_redirect_page_view', trackingPayload);

    let redirected = false;
    function redirectToWhatsApp(source){
      if (redirected) return;
      redirected = true;
      const payload = {...trackingPayload, source_trigger: source};
      safeTrackMetaStd('Contact', {content_name: 'whatsapp_redirect', ...payload});
      safeTrackMeta('WhatsAppClick', payload);
      safeTrackGoogle('generate_lead', payload);
      safeTrackGoogle('whatsapp_click', payload);
      statusEl.textContent = 'Abrindo o WhatsApp… Se não abrir, use o botão verde abaixo.';

      window.location.href = waAppUrl;
      setTimeout(() => {
        window.location.href = waWebUrl;
      }, 700);
    }

    function renderMeta(){
      const rows = [];
      rows.push(`<div><strong>Destino:</strong> ${WA_NUMBER}</div>`);
      rows.push(`<div><strong>click_ref:</strong> ${clickRef}</div>`);
      if (Object.keys(utms).length) {
        rows.push(`<div><strong>UTMs capturadas:</strong> ${Object.entries(utms).map(([k,v]) => `${k}=${v}`).join(' | ')}</div>`);
      } else {
        rows.push('<div><strong>UTMs capturadas:</strong> nenhuma</div>');
      }
      if (Object.keys(clickIds).length) {
        rows.push(`<div><strong>IDs de clique:</strong> ${Object.keys(clickIds).join(', ')}</div>`);
      }
      metaEl.innerHTML = rows.join('');
    }

    copyMsgEl.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(waMessage);
        toastEl.textContent = 'Mensagem copiada. Se precisar, cole manualmente no WhatsApp.';
      } catch (_) {
        toastEl.textContent = 'Não consegui copiar automaticamente. Use o botão verde para abrir o WhatsApp.';
      }
    });

    openNowEl.addEventListener('click', (event) => {
      event.preventDefault();
      redirectToWhatsApp('manual_button');
    });

    renderMeta();
    setTimeout(() => redirectToWhatsApp('auto_redirect'), REDIRECT_DELAY_MS);
  </script>
</body>
</html>
