<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Advanx IA | Redirecionando para o WhatsApp</title>
  <meta name="description" content="Estamos te redirecionando para o WhatsApp da Advanx IA.">
  <meta name="theme-color" content="#0b0f14">
  <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
  <link rel="preconnect" href="https://www.googletagmanager.com" crossorigin>
  <link rel="dns-prefetch" href="//connect.facebook.net">
  <link rel="dns-prefetch" href="//www.googletagmanager.com">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-98EL5GXG5F"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-98EL5GXG5F', { send_page_view: false });
  </script>

  <script>
    (function(f,b,e,v,n,t,s){
      if(f.fbq) return;
      n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq) f._fbq=n;
      n.push=n;
      n.loaded=!0;
      n.version='2.0';
      n.queue=[];
      t=b.createElement(e);
      t.async=!0;
      t.src=v;
      s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s);
    })(window,document,'script','https://connect.facebook.net/en_US/fbevents.js');

    window.ADVANX_META_PIXEL_IDS = ['502759528362336'];
    window.ADVANX_META_PIXEL_IDS.forEach(function(id){ fbq('init', id); });
  </script>
  <noscript>
    <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=502759528362336&ev=PageView&noscript=1" alt="">
  </noscript>

  <style>
    :root{
      --bg:#0b0f14;
      --card:rgba(17,24,38,.82);
      --line:rgba(255,255,255,.08);
      --text:#f8fafc;
      --muted:#94a3b8;
      --brand:#ff7a01;
      --wa:#25d366;
      --shadow:0 30px 80px rgba(0,0,0,.42);
      --radius:28px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,122,1,.18), transparent 34%),
        radial-gradient(circle at bottom left, rgba(37,211,102,.10), transparent 28%),
        linear-gradient(180deg, #0a0d12 0%, var(--bg) 100%);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:linear-gradient(120deg, rgba(255,255,255,.035), transparent 24%, transparent 76%, rgba(255,255,255,.03));
      opacity:.8;
    }
    .panel{
      width:min(100%, 760px);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:32px;
      position:relative;
      overflow:hidden;
      z-index:1;
      display:flex;
      flex-direction:column;
      align-items:stretch;
      gap:0;
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      color:#dbeafe;
      font-size:12px;
      font-weight:700;
      letter-spacing:.16em;
      text-transform:uppercase;
      align-self:center;
    }
    .eyebrow-dot{
      width:9px;
      height:9px;
      border-radius:999px;
      background:linear-gradient(135deg, var(--brand), var(--wa));
      box-shadow:0 0 0 8px rgba(255,122,1,.12);
      flex:none;
    }
    .hero{
      margin-top:22px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      text-align:center;
    }
    .hero-copy{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      min-width:0;
    }
    .icon-wrap{
      width:78px;
      height:78px;
      border-radius:24px;
      flex:none;
      display:grid;
      place-items:center;
      background:linear-gradient(180deg, rgba(37,211,102,.18), rgba(37,211,102,.10));
      border:1px solid rgba(37,211,102,.20);
      box-shadow:0 22px 48px rgba(37,211,102,.12);
      font-size:34px;
    }
    h1{
      margin:0;
      font-size:clamp(2rem, 4vw, 3.4rem);
      line-height:1.02;
      letter-spacing:-.04em;
      max-width:13ch;
      text-wrap:balance;
    }
    .status-card{
      margin-top:24px;
      display:grid;
      grid-template-columns:auto 1fr;
      gap:14px;
      align-items:center;
      padding:16px 18px;
      border-radius:20px;
      background:rgba(255,255,255,.04);
      border:1px solid var(--line);
      width:100%;
      text-align:left;
    }
    .spinner{
      width:18px;
      height:18px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.16);
      border-top-color:var(--brand);
      animation:spin .8s linear infinite;
    }
    .status-title{
      font-size:15px;
      font-weight:700;
      color:var(--text);
      margin:0;
    }
    .status-copy{
      margin:4px 0 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.55;
    }
    .actions{
      margin-top:22px;
      width:100%;
      display:flex;
      align-items:stretch;
      justify-content:center;
    }
    .btn{
      appearance:none;
      border:none;
      text-decoration:none;
      width:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:18px;
      min-height:56px;
      padding:16px 18px;
      font-size:16px;
      font-weight:800;
      line-height:1.2;
      cursor:pointer;
      transition:transform .16s ease, background .16s ease, box-shadow .16s ease;
      text-align:center;
    }
    .btn:hover{ transform:translateY(-1px); }
    .btn:active{ transform:translateY(0) scale(.985); }
    .btn-primary{
      color:#04110a;
      background:linear-gradient(135deg, var(--wa), #43ef88);
      box-shadow:0 18px 40px rgba(37,211,102,.22);
    }
    .microcopy{
      margin-top:14px;
      font-size:12px;
      color:#90a1b7;
      line-height:1.7;
      text-align:center;
    }
    .badge{
      margin-top:16px;
      padding:12px 14px;
      border-radius:16px;
      background:rgba(255,122,1,.10);
      border:1px solid rgba(255,122,1,.24);
      color:#ffd5b0;
      font-size:13px;
      line-height:1.55;
    }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    @media (max-width: 900px){
      .panel{ padding:24px; }
      .hero{ flex-direction:column; }
      h1{ max-width:none; }
    }
    @media (max-width: 640px){
      body{ padding:14px; }
      .panel{ border-radius:24px; padding:20px; }
      .icon-wrap{ width:68px; height:68px; border-radius:20px; font-size:30px; }
      .btn{ padding:15px 16px; font-size:15px; }
    }
    @media (prefers-reduced-motion: reduce){
      *, *::before, *::after{ animation:none !important; transition:none !important; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <div class="eyebrow"><span class="eyebrow-dot"></span> Advanx IA · encaminhamento seguro</div>

    <div class="hero">
      <div class="icon-wrap" aria-hidden="true">💬</div>
      <div class="hero-copy">
        <h1>Estamos te redirecionando para o WhatsApp</h1>
      </div>
    </div>

    <div class="status-card" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>
      <div>
        <p class="status-title">Estamos abrindo seu WhatsApp agora</p>
        <p class="status-copy">Você será redirecionado automaticamente em até 2 segundos. Se não abrir, use o botão abaixo.</p>
      </div>
    </div>

    <div class="actions">
      <a class="btn btn-primary" id="fallbackButton" href="#" rel="noopener">Abrir WhatsApp</a>
    </div>

    <p class="microcopy">Mensagem do WhatsApp: <strong>Oi Rafael, tudo certo por ai?</strong></p>
  </main>

  <script>
    (function(){
      var WA_NUMBER = '5571982470873';
      var EXACT_MESSAGE = 'Oi Rafael, tudo certo por ai?';
      var AUTO_REDIRECT_ENABLED = true;
      var REDIRECT_DELAY_MS = 2000;
      var APP_FALLBACK_DELAY_MS = 550;
      var url = new URL(window.location.href);
      var params = url.searchParams;
      var attributionKeys = ['utm_source','utm_medium','utm_campaign','utm_content','utm_term','fbclid','gclid','ttclid'];
      var attribution = {};
      attributionKeys.forEach(function(key){
        var value = params.get(key);
        if (value) attribution[key] = value;
      });

      var waLink = 'https://wa.me/' + WA_NUMBER + '?text=' + encodeURIComponent(EXACT_MESSAGE);
      var waAppLink = 'whatsapp://send?phone=' + WA_NUMBER + '&text=' + encodeURIComponent(EXACT_MESSAGE);
      var fallbackButton = document.getElementById('fallbackButton');
      fallbackButton.href = waLink;

      try {
        localStorage.setItem('advanx_last_whatsapp_redirect', JSON.stringify({
          destination: WA_NUMBER,
          page_url: window.location.href,
          query_string: window.location.search,
          target_url: waLink,
          message: EXACT_MESSAGE,
          attribution: attribution,
          created_at: new Date().toISOString()
        }));
      } catch (_) {}

      function trackMeta(eventName, payload, custom){
        try {
          if (typeof fbq === 'function') {
            if (custom) fbq('trackCustom', eventName, payload || {});
            else fbq('track', eventName, payload || {});
          }
        } catch (_) {}
      }

      function trackGA(eventName, payload){
        try {
          if (typeof gtag === 'function') gtag('event', eventName, payload || {});
        } catch (_) {}
      }

      var trackingPayload = Object.assign({
        page_location: window.location.href,
        page_path: window.location.pathname,
        page_title: document.title,
        event_source_url: window.location.href,
        query_string: window.location.search,
        destination_type: 'WHATSAPP',
        destination_label: 'advanx_ia',
        whatsapp_number: WA_NUMBER,
        message_template: EXACT_MESSAGE,
        source_platform: attribution.utm_source || '',
        source_medium: attribution.utm_medium || '',
        source_campaign: attribution.utm_campaign || ''
      }, attribution);

      trackMeta('PageView', trackingPayload, false);
      trackMeta('WhatsAppPageView', trackingPayload, true);
      trackGA('page_view', trackingPayload);
      trackGA('whatsapp_page_view', trackingPayload);

      function openWhatsApp(source){
        var eventPayload = Object.assign({}, trackingPayload, { trigger_source: source });
        trackMeta('Contact', eventPayload, false);
        trackMeta('WhatsAppContact', eventPayload, true);
        trackGA('contact', eventPayload);
        trackGA('whatsapp_contact', eventPayload);

        if (AUTO_REDIRECT_ENABLED) {
          window.location.href = waAppLink;
          window.setTimeout(function(){
            window.location.href = waLink;
          }, APP_FALLBACK_DELAY_MS);
        } else {
          window.location.href = waLink;
        }
      }

      fallbackButton.addEventListener('click', function(event){
        event.preventDefault();
        openWhatsApp('button_fallback');
      });

      if (AUTO_REDIRECT_ENABLED) {
        window.setTimeout(function(){
          openWhatsApp('auto_redirect');
        }, REDIRECT_DELAY_MS);
      }
    })();
  </script>
</body>
</html>
