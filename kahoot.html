<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kahoot - Full Screen</title>
    <style>
        /* Remove todas as margens e garante que o corpo ocupe a tela toda */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Impede barras de rolagem duplas */
            background-color: #000; /* Fundo neutro para carregamento */
        }

        /* Faz com que o iframe preencha todo o viewport */
        .full-screen-iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Iframe ocupando 100% da largura e altura disponível -->
    <iframe 
        class="full-screen-iframe"
        src="https://kahoott.lovable.app" 
        title="Kahoot Site"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        allowfullscreen>
    </iframe>

    <script>
        // Script simples para garantir que o iframe mantenha o foco se necessário
        window.onload = function() {
            const frame = document.querySelector('iframe');
            frame.focus();
        };
    </script>
</body>
</html>
