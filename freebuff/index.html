<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecionando…</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="referrer" content="no-referrer-when-downgrade">
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0b0f;
      --card: #14141b;
      --text: #f5f7fb;
      --muted: #a8b0c0;
      --accent: #6ee7b7;
      --border: rgba(255,255,255,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(110,231,183,.12), transparent 30%), var(--bg);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
    }
    .card {
      width: min(100%, 520px);
      background: rgba(20,20,27,.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 80px rgba(0,0,0,.35);
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.05;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }
    a {
      color: var(--accent);
      word-break: break-all;
    }
  </style>
  <script>
    (function () {
      const baseUrl = 'https://freebuff.com/web/?ref=ref-6421ff9a-d258-4dc9-b6b9-4b8294edb31f';
      const destination = new URL(baseUrl);
      const incoming = new URLSearchParams(window.location.search);
      incoming.forEach((value, key) => {
        if (!destination.searchParams.has(key)) {
          destination.searchParams.append(key, value);
        }
      });
      const target = destination.toString();
      document.addEventListener('DOMContentLoaded', function () {
        const fallback = document.getElementById('fallback-link');
        if (fallback) fallback.href = target;
      });
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  <main class="card">
    <h1>Redirecionando…</h1>
    <p>Se você não for redirecionado automaticamente, <a id="fallback-link" href="https://freebuff.com/web/?ref=ref-6421ff9a-d258-4dc9-b6b9-4b8294edb31f">clique aqui para continuar</a>.</p>
  </main>
</body>
</html>
