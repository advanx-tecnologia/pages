<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefing Advanx - Branding & Logo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --advanx-orange: #ff7a01;
            --advanx-dark: #0a0a0a;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--advanx-dark);
            color: #e5e5e5;
        }
        .step-content { display: none; }
        .step-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .question-group {
            margin-bottom: 1.5rem;
        }

        textarea {
            background: #171717 !important;
            border: 1px solid #333 !important;
            color: #fff !important;
            transition: all 0.3s ease;
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            resize: none;
        }
        textarea:focus {
            border-color: var(--advanx-orange) !important;
            box-shadow: 0 0 0 2px rgba(255, 122, 1, 0.2) !important;
            outline: none;
        }
        .sidebar-item {
            cursor: pointer;
            text-align: left;
            padding: 0.75rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            color: #9ca3af;
            transition: all 0.2s;
        }
        .sidebar-item.active {
            background: rgba(255, 122, 1, 0.1);
            border-left: 4px solid var(--advanx-orange);
            color: #fff;
        }
        .advanx-gradient {
            background: linear-gradient(to right, #ffa64d, var(--advanx-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        
        .btn-primary {
            background-color: var(--advanx-orange);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #e66e00;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col lg:flex-row">

    <!-- Sidebar -->
    <aside class="lg:w-80 w-full bg-[#0f0f0f] border-r border-white/5 p-6 flex flex-col max-h-screen overflow-y-auto">
        <div class="mb-10">
            <h1 class="text-2xl font-bold advanx-gradient">Advanx Portal</h1>
            <p class="text-[10px] text-gray-500 mt-1 uppercase tracking-[0.2em]">Estratégia & Identidade</p>
        </div>

        <nav class="flex-1 space-y-6 pr-2">
            <div>
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-3 tracking-widest">Briefing 1 — Branding</h3>
                <div class="space-y-1">
                    <button onclick="showStep('b1')" class="sidebar-item w-full active" data-step="b1">1. Fundação Estratégica</button>
                    <button onclick="showStep('b2')" class="sidebar-item w-full" data-step="b2">2. Público e Mercados</button>
                    <button onclick="showStep('b3')" class="sidebar-item w-full" data-step="b3">3. Posição Competitiva</button>
                    <button onclick="showStep('b4')" class="sidebar-item w-full" data-step="b4">4. Identidade Visual</button>
                    <button onclick="showStep('b5')" class="sidebar-item w-full" data-step="b5">5. Referências Visuais</button>
                    <button onclick="showStep('b6')" class="sidebar-item w-full" data-step="b6">6. Voz e Linguagem</button>
                    <button onclick="showStep('b7')" class="sidebar-item w-full" data-step="b7">7. Canais e Aplicações</button>
                    <button onclick="showStep('b8')" class="sidebar-item w-full" data-step="b8">8. Resultados</button>
                    <button onclick="showStep('b9')" class="sidebar-item w-full" data-step="b9">9. Operacional</button>
                </div>
            </div>

            <div>
                <h3 class="text-[10px] font-bold text-gray-500 uppercase mb-3 tracking-widest">Briefing 2 — Logo</h3>
                <div class="space-y-1">
                    <button onclick="showStep('l1')" class="sidebar-item w-full" data-step="l1">1. Sobre o Negócio</button>
                    <button onclick="showStep('l2')" class="sidebar-item w-full" data-step="l2">2. Público e Mercado</button>
                    <button onclick="showStep('l3')" class="sidebar-item w-full" data-step="l3">3. Referências Visuais</button>
                    <button onclick="showStep('l4')" class="sidebar-item w-full" data-step="l4">4. Elementos e Formato</button>
                    <button onclick="showStep('l5')" class="sidebar-item w-full" data-step="l5">5. Aplicações e Uso</button>
                    <button onclick="showStep('l6')" class="sidebar-item w-full" data-step="l6">6. Entrega</button>
                    <button onclick="showStep('l7')" class="sidebar-item w-full" data-step="l7">7. Contexto Adicional</button>
                </div>
            </div>
        </nav>

        <div class="mt-6">
            <button onclick="exportData()" class="w-full btn-primary text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-[#ff7a01]/20">
                Finalizar Briefing
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-6 lg:p-12 overflow-y-auto max-w-5xl mx-auto w-full">
        
        <div class="mb-8 flex justify-between items-end border-b border-white/5 pb-8">
            <div>
                <h2 id="section-title" class="text-3xl font-bold text-white">Fundação Estratégica</h2>
                <p id="section-desc" class="text-gray-400 mt-2 italic">Bloco 1 — Construindo os pilares da sua marca.</p>
            </div>
            <div class="text-right hidden sm:block">
                <div class="w-32 h-1.5 bg-white/5 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-[#ff7a01] transition-all duration-500" style="width: 5%"></div>
                </div>
            </div>
        </div>

        <form id="briefingForm">
            <!-- BRANDING -->
            <div id="step-b1" class="step-content active">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">1.1 Em uma frase, o que a sua empresa faz — e para quem?</label>
                    <textarea name="B1.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">1.2 Por que sua empresa existe além de gerar lucro? Qual problema ela resolve?</label>
                    <textarea name="B1.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">1.3 Se sua empresa fosse uma pessoa, como ela seria? Use adjetivos livres.</label>
                    <textarea name="B1.3" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">1.4 Quais são os três valores inegociáveis da empresa?</label>
                    <textarea name="B1.4" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">1.5 Como você quer que as pessoas se sintam depois de qualquer contato com sua marca?</label>
                    <textarea name="B1.5" rows="2"></textarea>
                </div>
            </div>

            <div id="step-b2" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">2.1 Quem é seu cliente principal? Idade, setor, cargo, dores.</label>
                    <textarea name="B2.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">2.2 Existe mais de um tipo de cliente? O que cada um tem de diferente?</label>
                    <textarea name="B2.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">2.3 O cliente decide sozinho ou precisa convencer outras pessoas?</label>
                    <textarea name="B2.3" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">2.4 Em qual mercado você não quer entrar — mesmo que ele te procure?</label>
                    <textarea name="B2.4" rows="2"></textarea>
                </div>
            </div>

            <div id="step-b3" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">3.1 Cite 2-3 concorrentes. O que fazem bem? O que fazem mal?</label>
                    <textarea name="B3.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">3.2 Por que um cliente escolhe o concorrente em vez de você?</label>
                    <textarea name="B3.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">3.3 Qual argumento fecha mais negócios para você?</label>
                    <textarea name="B3.3" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">3.4 Em que você é objetivamente melhor — e consegue provar com dados?</label>
                    <textarea name="B3.4" rows="2"></textarea>
                </div>
            </div>

            <div id="step-b4" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">4.1 Você já tem logo? Há significado por trás das formas ou cores?</label>
                    <textarea name="B4.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">4.2 O que você ama no logo atual? E o que nunca gostou?</label>
                    <textarea name="B4.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">4.3 Quais cores usa hoje? Sabe os códigos HEX/RGB/Pantone?</label>
                    <textarea name="B4.3" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">4.4 Alguma cor que jamais usaria — por associação com concorrente ou valor?</label>
                    <textarea name="B4.4" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">4.5 Quais fontes/tipografias a empresa usa hoje?</label>
                    <textarea name="B4.5" rows="2"></textarea>
                </div>
            </div>

            <div id="step-b5" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">5.1 3 marcas de qualquer setor que você admira visualmente. Por quê?</label>
                    <textarea name="B5.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">5.2 1-2 marcas que você não quer parecer.</label>
                    <textarea name="B5.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">5.3 Escolha entre os pares (Sério ou descontraído? Sofisticado ou acessível? Minimalista ou expressivo? Tradicional ou inovador? Quente ou frio?):</label>
                    <textarea name="B5.3" rows="2" placeholder="Digite suas preferências aqui..."></textarea>
                </div>
            </div>

            <div id="step-b6" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">6.1 A empresa trata o cliente de "você" ou "senhor"? Usa gírias do setor?</label>
                    <textarea name="B6.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">6.2 Alguma palavra ou frase que virou quase uma assinatura da empresa?</label>
                    <textarea name="B6.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">6.3 Alguma palavra ou promessa que nunca deve aparecer?</label>
                    <textarea name="B6.3" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">6.4 Como a empresa fala em momentos difíceis — erro, atraso, crise?</label>
                    <textarea name="B6.4" rows="2"></textarea>
                </div>
            </div>

            <div id="step-b7" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">7.1 Liste todos os lugares onde sua marca aparece: site, redes, apresentações, uniformes, embalagem...</label>
                    <textarea name="B7.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">7.2 Qual canal é mais importante para fechar negócios? Qual você mais negligencia?</label>
                    <textarea name="B7.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">7.3 Seu site existe? Quem costuma atualizar?</label>
                    <textarea name="B7.3" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">7.4 Qual plataforma de design a equipe usa? Quem cria materiais de comunicação?</label>
                    <textarea name="B7.4" rows="2"></textarea>
                </div>
            </div>

            <div id="step-b8" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">8.1 Qual é o resultado mais concreto que um cliente já teve com você?</label>
                    <textarea name="B8.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">8.2 Tem cases, depoimentos, dados ou prêmios que provam sua promessa?</label>
                    <textarea name="B8.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">8.3 Existe algum número que impressiona quando compartilhado?</label>
                    <textarea name="B8.3" rows="2"></textarea>
                </div>
            </div>

            <div id="step-b9" class="step-content">
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">9.1 Quem vai usar o brand guidelines no dia a dia?</label>
                    <textarea name="B9.1" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">9.2 Hoje como decidem cores, fontes e linguagem em novos materiais?</label>
                    <textarea name="B9.2" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">9.3 Qual é o maior problema que você quer resolver com esse brand guidelines?</label>
                    <textarea name="B9.3" rows="2"></textarea>
                </div>
                <div class="question-group">
                    <label class="block text-sm font-medium text-gray-300 mb-2">9.4 Existe prazo, lançamento ou evento que precisamos respeitar?</label>
                    <textarea name="B9.4" rows="2"></textarea>
                </div>
            </div>

            <!-- LOGO BRIEFING (L1 a L7) -->
            <div id="step-l1" class="step-content">
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">1. Qual é o nome exato da empresa ou marca?</label><textarea name="L1"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">2. O que a empresa faz, de forma simples e direta?</label><textarea name="L2"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">3. A marca é nova, um rebranding ou atualização de algo existente?</label><textarea name="L3"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">4. Se a empresa fosse uma pessoa, como ela seria? Até 5 adjetivos.</label><textarea name="L4"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">5. Qual é a missão ou propósito da empresa?</label><textarea name="L5"></textarea></div>
            </div>

            <div id="step-l2" class="step-content">
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">6. Quem é o seu cliente ideal? Faixa etária, perfil, o que valoriza.</label><textarea name="L6"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">7. Quais são os 3 principais concorrentes? (nome + site se possível)</label><textarea name="L7"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">8. O que você quer que as pessoas sintam ao ver sua logo pela primeira vez?</label><textarea name="L8"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">9. Como você se posiciona? Preço baixo, qualidade premium, nicho, inovação?</label><textarea name="L9"></textarea></div>
            </div>

            <div id="step-l3" class="step-content">
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">10. Logos que você admira — de qualquer setor. Envie nomes.</label><textarea name="L10"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">11. Logos que você definitivamente não quer como referência. O que odeia esteticamente?</label><textarea name="L11"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">12. Tem alguma cor que já associa à sua marca?</label><textarea name="L12"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">13. Tem alguma cor proibida?</label><textarea name="L13"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">14. Prefere estilo clássico/atemporal ou moderno/contemporâneo?</label><textarea name="L14"></textarea></div>
            </div>

            <div id="step-l4" class="step-content">
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">15. Quer só o nome escrito, só um símbolo/ícone, ou os dois juntos?</label><textarea name="L15"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">16. Se quiser símbolo: geométrico, orgânico, abstrato, ícone literal, inicial da empresa ou mascote?</label><textarea name="L16"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">17. A logo precisa funcionar em versão horizontal, vertical ou ambas?</label><textarea name="L17"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">18. Vai aparecer em fundo escuro e fundo claro?</label><textarea name="L18"></textarea></div>
            </div>

            <div id="step-l5" class="step-content">
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">19. Onde a logo vai ser usada? (site, redes, uniforme, fachada...)</label><textarea name="L19"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">20. Será usada em contextos internacionais ou existe plano de expansão?</label><textarea name="L20"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">21. Existe material já existente que a nova logo precisa conviver?</label><textarea name="L21"></textarea></div>
            </div>

            <div id="step-l6" class="step-content">
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">22. Precisa de um guia de uso da marca (manual de identidade)?</label><textarea name="L22"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">23. Além da logo, precisa de outros elementos? (paleta, tipografia, templates)</label><textarea name="L23"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">24. Quais formatos de arquivo precisa? (PNG, SVG, PDF, AI/EPS)</label><textarea name="L24"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">25. Qual é o prazo esperado? Existe data limite?</label><textarea name="L25"></textarea></div>
            </div>

            <div id="step-l7" class="step-content">
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">26. Existe história ou significado por trás do nome que gostaria de ver na logo?</label><textarea name="L26"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">27. Algo que absolutamente não quer na logo — mesmo que faça sentido para o setor?</label><textarea name="L27"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">28. Você tem orçamento definido para o projeto?</label><textarea name="L28"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">29. Quem vai aprovar a logo no final? Só você, ou tem sócio/comitê?</label><textarea name="L29"></textarea></div>
                <div class="question-group"><label class="block text-sm font-medium text-gray-300 mb-2">30. Alguma informação importante que não coube acima?</label><textarea name="L30"></textarea></div>
            </div>
        </form>

        <div class="mt-12 flex justify-between">
            <button onclick="prevStep()" id="btn-prev" class="px-6 py-2 rounded-lg bg-white/5 text-gray-400 hover:text-white hover:bg-white/10 transition-all hidden">Voltar</button>
            <button onclick="nextStep()" id="btn-next" class="px-6 py-2 rounded-lg btn-primary text-white ml-auto">Próximo</button>
        </div>
    </main>

    <!-- Modal Conclusão -->
    <div id="modal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50 hidden p-4">
        <div class="bg-[#171717] p-8 rounded-3xl max-w-4xl w-full border border-white/10 shadow-2xl flex flex-col max-h-[90vh]">
            <h3 class="text-2xl font-bold text-white mb-2">Briefing Advanx Concluído! 🚀</h3>
            <p class="text-gray-400 mb-6 text-sm">Abaixo está o resumo que será enviado para a equipe Advanx.</p>
            <textarea id="result-text" readonly class="flex-1 w-full p-4 text-xs font-mono mb-6 bg-black/30 border border-white/10 rounded-xl"></textarea>
            <div class="flex flex-col sm:flex-row gap-4">
                <button onclick="sendToWhatsApp()" class="flex-1 bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition-all font-bold flex items-center justify-center gap-2">
                    Enviar para WhatsApp
                </button>
                <button onclick="closeModal()" class="flex-1 bg-white/5 text-white py-3 rounded-xl hover:bg-white/10 transition-all">Revisar Campos</button>
            </div>
        </div>
    </div>

    <script>
        const whatsappNumber = "5571981897865"; 
        const steps = ['b1', 'b2', 'b3', 'b4', 'b5', 'b6', 'b7', 'b8', 'b9', 'l1', 'l2', 'l3', 'l4', 'l5', 'l6', 'l7'];
        let currentStepIndex = 0;

        const titles = {
            'b1': ['1. Fundação Estratégica', 'Missão, valores e personalidade.'],
            'b2': ['2. Público e Mercados', 'Perfil do seu cliente ideal.'],
            'b3': ['3. Posição Competitiva', 'Concorrentes e seus diferenciais.'],
            'b4': ['4. Identidade Visual', 'Análise do que já existe hoje.'],
            'b5': ['5. Referências Visuais', 'Inspirações e direções estéticas.'],
            'b6': ['6. Voz e Linguagem', 'Como a marca se comunica verbalmente.'],
            'b7': ['7. Canais e Aplicações', 'Onde sua marca aparece no mundo.'],
            'b8': ['8. Resultados', 'Cases, dados e provas de valor.'],
            'b9': ['9. Operacional', 'Prazos e gestão do projeto.'],
            'l1': ['Logo: 1 a 5', 'Negócio e Missão.'],
            'l2': ['Logo: 6 a 9', 'Público e Posicionamento.'],
            'l3': ['Logo: 10 a 14', 'Estilo e Cores.'],
            'l4': ['Logo: 15 a 18', 'Formato e Símbolos.'],
            'l5': ['Logo: 19 a 21', 'Aplicações e Expansão.'],
            'l6': ['Logo: 22 a 25', 'Entrega e Prazos.'],
            'l7': ['Logo: 26 a 30', 'Contexto Extra.']
        };

        function showStep(stepId) {
            currentStepIndex = steps.indexOf(stepId);
            document.querySelectorAll('.sidebar-item').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.step === stepId) btn.classList.add('active');
            });
            document.getElementById('section-title').innerText = titles[stepId][0];
            document.getElementById('section-desc').innerText = titles[stepId][1];
            document.getElementById('progress-bar').style.width = ((currentStepIndex + 1) / steps.length * 100) + '%';
            document.querySelectorAll('.step-content').forEach(s => s.classList.remove('active'));
            document.getElementById(`step-${stepId}`).classList.add('active');
            document.getElementById('btn-prev').style.display = currentStepIndex === 0 ? 'none' : 'block';
            document.getElementById('btn-next').innerText = currentStepIndex === steps.length - 1 ? 'Finalizar' : 'Próximo';
        }

        function nextStep() {
            if (currentStepIndex < steps.length - 1) { showStep(steps[currentStepIndex + 1]); window.scrollTo(0,0); }
            else { exportData(); }
        }

        function prevStep() {
            if (currentStepIndex > 0) { showStep(steps[currentStepIndex - 1]); window.scrollTo(0,0); }
        }

        function exportData() {
            let output = "*=== BRIEFING OFICIAL ADVANX ===*\n\n";
            let emptyCount = 0;
            const areas = document.querySelectorAll('#briefingForm textarea');

            areas.forEach(area => {
                if (area.value.trim() !== "") {
                    // Busca o texto da pergunta dentro do label anterior
                    const label = area.previousElementSibling;
                    const questionText = label ? label.innerText : area.name;
                    output += `*Pergunta:* ${questionText}\n*Resposta:* ${area.value}\n\n`;
                } else {
                    emptyCount++;
                }
            });

            if(emptyCount === areas.length) {
                alert("Por favor, preencha pelo menos um campo do formulário.");
                return;
            }

            document.getElementById('result-text').value = output;
            document.getElementById('modal').classList.remove('hidden');
        }

        function sendToWhatsApp() {
            const text = document.getElementById('result-text').value;
            window.open(`https://api.whatsapp.com/send?phone=${whatsappNumber}&text=${encodeURIComponent(text)}`, '_blank');
        }

        function copyToClipboard() {
            const t = document.getElementById("result-text"); t.select(); document.execCommand("copy"); alert("Copiado!");
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
