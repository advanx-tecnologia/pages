<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Page</title>
    <style>
        /* Reset margins and padding to ensure full screen coverage */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrollbars on the main page */
        }

        /* Style the iframe to fill the entire container */
        .full-screen-iframe {
            width: 100%;
            height: 100%;
            border: none; /* Remove default iframe border */
            display: block; /* Ensure it behaves like a block element */
        }
    </style>
</head>
<body>
    <!-- The iframe embeds the target URL -->
    <iframe 
        src="https://n8n.advfunnel.com.br/webhook/qrcodeevo" 
        class="full-screen-iframe" 
        title="Embedded Content">
    </iframe>
</body>
</html>
