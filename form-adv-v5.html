<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diagnóstico Advanx</title>
  <style>
    :root{--bg:#0b0b0f;--card:#14141c;--text:#f5f7ff;--muted:#aeb3c2;--primary:#6d5cff;--primary2:#8f84ff;--ok:#28d17c}
    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#09090d,#12121a);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text)}
    .wrap{max-width:760px;margin:32px auto;padding:16px}
    .card{background:var(--card);border:1px solid #242436;border-radius:18px;padding:26px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
    h1{font-size:clamp(24px,3vw,34px);margin:0 0 8px} p{color:var(--muted);margin:0 0 22px}
    label{display:block;font-weight:600;margin:14px 0 8px}
    input,select{width:100%;padding:14px;border-radius:12px;border:1px solid #30344a;background:#0f1018;color:#fff;font-size:16px}
    input:focus,select:focus{outline:none;border-color:var(--primary2);box-shadow:0 0 0 3px rgba(109,92,255,.2)}
    button{margin-top:22px;width:100%;padding:14px;border:0;border-radius:12px;background:linear-gradient(90deg,var(--primary),var(--primary2));color:#fff;font-weight:700;font-size:16px;cursor:pointer}
    .tiny{margin-top:10px;color:#8e93a6;font-size:13px}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Preencha para liberar seu diagnóstico</h1>
      <p>Leva menos de 1 minuto.</p>

      <form id="leadForm">
        <label for="nome">Nome completo</label>
        <input id="nome" name="nome" type="text" required placeholder="Ex: João da Silva" />

        <label for="whatsapp">WhatsApp</label>
        <input id="whatsapp" name="whatsapp" type="tel" required placeholder="(71) 99999-9999" />

        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" required placeholder="voce@exemplo.com" />

        <label for="nicho">Nicho</label>
        <select id="nicho" name="nicho" required>
          <option value="" selected disabled>Selecione</option>
          <option>Trabalhista</option>
          <option>Tributário</option>
          <option>Bancário</option>
          <option>Civil</option>
          <option>Criminal</option>
          <option>Imobiliário</option>
          <option>Outros</option>
        </select>

        <button type="submit">Continuar</button>
        <div class="tiny">Ao continuar, você será redirecionado para a página com vídeo e botão de WhatsApp.</div>
      </form>
    </section>
  </main>

  <script>
    document.getElementById('leadForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const data = new FormData(e.target);
      const params = new URLSearchParams();
      params.set('nome', (data.get('nome') || '').toString().trim());
      params.set('whatsapp', (data.get('whatsapp') || '').toString().trim());
      params.set('email', (data.get('email') || '').toString().trim());
      params.set('nicho', (data.get('nicho') || '').toString().trim());
      window.location.href = '/form-adv-v5-obrigado.html?' + params.toString();
    });
  </script>
</body>
</html>
