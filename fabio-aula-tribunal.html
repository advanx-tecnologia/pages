    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webnário Tribunal - Visualização</title>
    <style>
        /* Remove margens e preenchimentos padrão do navegador */

            overflow: hidden; /* Impede barras de rolagem duplas */

        /* Faz o iframe ocupar todo o espaço disponível */

            position: absolute;
            top: 0;

            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

</html>
